name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Python tests
        run: python -m unittest discover -s tests -v
      - name: Python syntax
        run: python -m py_compile lth_backtest/*.py
      - name: Browser JavaScript syntax
        run: node --check lth_backtest/static/app.js
